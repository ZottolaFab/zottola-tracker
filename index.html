<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zottola Fab Shop Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 1rem; }
.container { max-width: 100%; background: white; border-radius: 8px; padding: 1rem; }
.header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0; }
.header img { max-width: 80px; margin-bottom: 0.5rem; }
.header h2 { font-size: 18px; margin: 0 0 4px 0; }
.header p { font-size: 12px; color: #999; margin: 0; }
.date-selector { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0; }
.date-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.date-controls button { padding: 8px 12px; font-size: 13px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
.date-controls button:hover { background: #f5f5f5; }
.date-controls input[type="date"] { padding: 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px; }
.date-display { font-size: 13px; color: #666; font-weight: 500; padding: 0 8px; }
.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
.tab-btn { border: none; background: transparent; padding: 8px 0; font-size: 13px; cursor: pointer; color: #999; white-space: nowrap; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #333; border-bottom-color: #333; font-weight: 500; }
.tab-content { display: none; }
.tab-content.active { display: block; }
label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
select, input[type="text"], input[type="number"] { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; background: white; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
button { padding: 10px 16px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; min-height: 44px; }
button:hover { background: #f5f5f5; }
.summary-box { background: #f9f9f9; padding: 1rem; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 1rem; }
.summary-title { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 8px; }
.hours-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.hour-box { background: white; padding: 12px; border-radius: 4px; border: 1px solid #e0e0e0; text-align: center; }
.hour-label { font-size: 10px; color: #999; margin-bottom: 6px; }
.hour-value { font-size: 18px; font-weight: 500; }
.info-box { background: #e3f2fd; padding: 12px; border-radius: 4px; font-size: 13px; color: #1976d2; margin-bottom: 1rem; }
.project-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.project-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f9f9f9; border-radius: 4px; border: 1px solid #e0e0e0; font-size: 13px; }
.delete-btn { padding: 6px 12px; font-size: 12px; border: 1px solid #f44336; background: transparent; color: #f44336; }
.warning-btn { border: 1px solid #f44336; color: #f44336; background: transparent; }
.week-view-header { font-size: 14px; font-weight: 600; margin: 1.5rem 0 1rem 0; padding: 1rem; background: #f0f0f0; border-radius: 4px; }
.day-box { background: #f9f9f9; padding: 1rem; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 1rem; }
.day-header { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #333; }
.project-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #e0e0e0; }
.project-row:last-child { border-bottom: none; }
.day-total { padding: 8px 0; margin-top: 8px; border-top: 2px solid #e0e0e0; font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; }
.week-total { background: #e3f2fd; padding: 1rem; border-radius: 4px; font-size: 14px; font-weight: 600; margin-top: 1rem; display: flex; justify-content: space-between; color: #1976d2; }
@media (prefers-color-scheme: dark) {
body { background: #1a1a1a; }
.container { background: #2a2a2a; color: #f0f0f0; }
select, input[type="text"], input[type="number"], input[type="date"] { background: #333; color: #f0f0f0; border-color: #444; }
button { background: #333; color: #f0f0f0; border-color: #444; }
button:hover { background: #444; }
.summary-box { background: #333; border-color: #444; }
.hour-box { background: #2a2a2a; border-color: #444; }
.project-item { background: #333; border-color: #444; }
.info-box { background: #1a3a52; color: #90caf9; }
.date-display { color: #bbb; }
.day-box { background: #333; border-color: #444; }
.project-row { border-bottom-color: #444; }
.day-total { border-top-color: #444; }
.week-view-header { background: #444; }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<img src="Zottola_Fab.jpg" alt="Zottola Fab Logo" onerror="this.style.display='none'">
<h2>Zottola Fab Shop Tracker</h2>
</div>
<div class="date-selector">
<div class="date-controls">
<button onclick="goToDate('prev')">← Prior Day</button>
<input type="date" id="dateInput" onchange="jumpToDate()">
<button onclick="goToDate('today')">Today</button>
<button onclick="goToDate('next')">Next Day →</button>
<span class="date-display" id="dateDisplay"></span>
</div>
</div>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('track')">Track</button>
<button class="tab-btn" onclick="switchTab('week')">Week View</button>
<button class="tab-btn" onclick="switchTab('summary')">Summary</button>
<button class="tab-btn" onclick="switchTab('admin')">Admin</button>
<button class="tab-btn" onclick="switchTab('settings')">Settings</button>
</div>
<div id="track" class="tab-content active">
<div class="grid-2">
<div><label>Who is working?</label><select id="emp" onchange="saveState()"><option>Fred</option><option>Jim</option><option>Laura</option><option>Mark</option><option>Jeff</option><option>Rich</option><option>Cody</option><option>Darin</option><option>Kate</option><option>Tony</option></select></div>
<div><label>Current project</label><select id="proj" onchange="saveState()"></select></div>
</div>
<div class="grid-2">
<div><label>Work type</label><select id="workType" onchange="saveState()"></select></div>
<div><label>Category</label><input type="text" id="category" placeholder="Optional" onchange="saveState()"></div>
</div>
<div style="margin-top: 1.5rem;"><p style="font-size: 13px; color: #666; margin-bottom: 12px; font-weight: 500;">Quick Adjustment</p><div class="grid-4" id="quickButtons"></div><p style="font-size: 12px; color: #666; margin: 12px 0 8px;">Manual adjustment</p><div class="grid-4" id="manualInputs"></div></div>
<div class="summary-box" style="margin-top: 1.5rem;"><div class="summary-title" id="summaryTitle"></div><div class="hours-grid" id="summaryHours"></div></div>
<button onclick="exportCSV()" style="width: 100%; margin-top: 1rem;">Export</button>
</div>
<div id="week" class="tab-content">
<div><label>View week for</label><select id="weekEmp" onchange="updateWeekView()"></select></div>
<div id="weekContent"></div>
</div>
<div id="summary" class="tab-content">
<div><label>View for</label><select id="summaryEmp" onchange="updateSummaryView()"></select></div>
<div id="summaryContent" style="margin-top: 1rem;"></div>
<button onclick="exportCSV()" style="width: 100%; margin-top: 1rem;">Export</button>
</div>
<div id="admin" class="tab-content">
<div class="info-box">Manage Projects<br>Current: <span id="projectCount">0</span></div>
<div style="display: flex; gap: 8px; margin-bottom: 1rem;"><input type="text" id="newProjectInput" placeholder="New project name"><button onclick="addProject()">Add</button></div>
<div class="project-list" id="projectList"></div>
<button onclick="resetProjects()" style="width: 100%; margin-top: 1rem;">Reset projects to defaults</button>
<div class="info-box" style="margin-top: 1rem;">Manage Work Types<br>Current: <span id="workTypeCount">0</span></div>
<div style="display: flex; gap: 8px; margin-bottom: 1rem;"><input type="text" id="newWorkTypeInput" placeholder="New work type"><button onclick="addWorkType()">Add</button></div>
<div class="project-list" id="workTypeList"></div>
<button onclick="resetWorkTypes()" style="width: 100%; margin-top: 1rem;">Reset work types to defaults</button>
</div>
<div id="settings" class="tab-content">
<div class="info-box">App Status<br>Employees: 10<br>Projects: <span id="settingsProjects">0</span><br>Work Types: <span id="settingsWorkTypes">0</span></div>
<button onclick="clearDateData()" class="warning-btn" style="width: 100%;">Clear this date's data</button>
</div>
</div>
<script>
const defaultProjects=['Estimate','Misc','Office','Off','Vacation','Holiday'];const defaultWorkTypes=['Beams','Plates','Miscellaneous'];const types=['Office','Shop','Onsite','Travel'];let currentDate=new Date().toISOString().split('T')[0];let projects=JSON.parse(localStorage.getItem('zottola_projects'))||defaultProjects;let workTypes=JSON.parse(localStorage.getItem('zottola_workTypes'))||defaultWorkTypes;let data={};function getStorageKey(dateStr){return `zottola_hours_${dateStr}`;}function loadDataForDate(dateStr){const key=getStorageKey(dateStr);data=JSON.parse(localStorage.getItem(key))||{};}function saveData(){const key=getStorageKey(currentDate);localStorage.setItem(key,JSON.stringify(data));}function setCurrentDate(dateStr){currentDate=dateStr;loadDataForDate(dateStr);updateDateDisplay();renderManualInputs();updateSummary();}function updateDateDisplay(){const d=new Date(currentDate+'T00:00:00');const dayName=d.toLocaleDateString('en-US',{weekday:'long'});const dateStr=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});document.getElementById('dateDisplay').textContent=`${dayName}, ${dateStr}`;document.getElementById('dateInput').value=currentDate;}function goToDate(dir){const d=new Date(currentDate+'T00:00:00');if(dir==='prev')d.setDate(d.getDate()-1);else if(dir==='next')d.setDate(d.getDate()+1);else if(dir==='today')d=new Date();const newDate=d.toISOString().split('T')[0];setCurrentDate(newDate);}function jumpToDate(){const dateInput=document.getElementById('dateInput').value;if(dateInput)setCurrentDate(dateInput);}function getMondayOfWeek(dateStr){const d=new Date(dateStr+'T00:00:00');const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff)).toISOString().split('T')[0];}function getDateRange(startDate){const dates=[];for(let i=0;i<6;i++){const d=new Date(startDate+'T00:00:00');d.setDate(d.getDate()+i);dates.push(d.toISOString().split('T')[0]);}return dates;}function updateWeekView(){const emp=document.getElementById('weekEmp').value;const mondayDate=getMondayOfWeek(currentDate);const weekDates=getDateRange(mondayDate);const d=new Date(mondayDate+'T00:00:00');const weekStr=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});let html=`<div class="week-view-header">${emp.toUpperCase()} - Week of ${weekStr}</div>`;let weekTotalHours=0;const dayNames=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];weekDates.forEach((dateStr,idx)=>{const dayData=JSON.parse(localStorage.getItem(getStorageKey(dateStr)))||{};const dayName=dayNames[idx];const projectHours={};projects.forEach(p=>{let pTotal=0;workTypes.forEach(w=>{types.forEach(t=>{pTotal+=dayData[`${emp}|${p}|${t}|${w}|`]||0;});});if(pTotal>0){projectHours[p]=pTotal;}});const dayTotal=Object.values(projectHours).reduce((a,b)=>a+b,0);weekTotalHours+=dayTotal;if(dayTotal>0||Object.keys(projectHours).length>0){html+=`<div class="day-box"><div class="day-header">${dayName}</div>`;Object.entries(projectHours).forEach(([proj,hrs])=>{if(hrs>0){html+=`<div class="project-row"><span>${proj}</span><span>${hrs.toFixed(2)}h</span></div>`;}});html+=`<div class="day-total"><span>Day Total</span><span>${dayTotal.toFixed(2)}h</span></div></div>`;}});html+=`<div class="week-total"><span>Week Total</span><span>${weekTotalHours.toFixed(2)}h</span></div>`;document.getElementById('weekContent').innerHTML=html;}function init(){renderSelects();renderQuickButtons();renderManualInputs();updateSummary();updateProjectList();updateWorkTypeList();loadState();setCurrentDate(new Date().toISOString().split('T')[0]);}function saveState(){saveData();updateSummary();}function loadState(){const emp=localStorage.getItem('zottola_emp');const proj=localStorage.getItem('zottola_proj');const workType=localStorage.getItem('zottola_workType');if(emp)document.getElementById('emp').value=emp;if(proj)document.getElementById('proj').value=proj;if(workType)document.getElementById('workType').value=workType;}function renderSelects(){const projSelect=document.getElementById('proj');const workSelect=document.getElementById('workType');const summaryEmpSelect=document.getElementById('summaryEmp');const weekEmpSelect=document.getElementById('weekEmp');projSelect.innerHTML=projects.map(p=>`<option>${p}</option>`).join('');workSelect.innerHTML=workTypes.map(w=>`<option>${w}</option>`).join('');summaryEmpSelect.innerHTML=['Fred','Jim','Laura','Mark','Jeff','Rich','Cody','Darin','Kate','Tony'].map(e=>`<option>${e}</option>`).join('');weekEmpSelect.innerHTML=['Fred','Jim','Laura','Mark','Jeff','Rich','Cody','Darin','Kate','Tony'].map(e=>`<option>${e}</option>`).join('');}function renderQuickButtons(){const btn=document.getElementById('quickButtons');btn.innerHTML=types.map(t=>`<div style="display: flex; gap: 6px;"><button onclick="addHours('${t}',0.5)" style="flex: 1;">+0.5h ${t}</button><button onclick="addHours('${t}',1)" style="flex: 1;">+1h ${t}</button></div>`).join('');}function renderManualInputs(){const inp=document.getElementById('manualInputs');inp.innerHTML=types.map(t=>`<div><label>${t}</label><input type="number" step="0.25" min="0" value="${getHours(t).toFixed(2)}" onchange="setHours('${t}', this.value)"></div>`).join('');}function getKey(t,c=''){const emp=document.getElementById('emp').value;const proj=document.getElementById('proj').value;const wt=document.getElementById('workType').value;return `${emp}|${proj}|${t}|${wt}|${c}`;}function getHours(t){return data[getKey(t)]||0;}function addHours(t,n){const k=getKey(t);data[k]=(data[k]||0)+n;saveState();renderManualInputs();}function setHours(t,v){const k=getKey(t);data[k]=Math.max(0,parseFloat(v)||0);saveState();renderManualInputs();}function updateSummary(){const emp=document.getElementById('emp').value;const proj=document.getElementById('proj').value;const wt=document.getElementById('workType').value;const cat=document.getElementById('category').value;document.getElementById('summaryTitle').textContent=`${proj} - ${wt}${cat?` - ${cat}`:''}`.toUpperCase();const hg=document.getElementById('summaryHours');hg.innerHTML=types.map(t=>{const hrs=data[getKey(t)]||0;return `<div class="hour-box"><div class="hour-label">${t}</div><div class="hour-value">${hrs.toFixed(2)}h</div></div>`;}).join('');localStorage.setItem('zottola_emp',emp);localStorage.setItem('zottola_proj',proj);localStorage.setItem('zottola_workType',wt);}function updateSummaryView(){const emp=document.getElementById('summaryEmp').value;const con=document.getElementById('summaryContent');con.innerHTML='';projects.forEach(p=>{let pTotal=0;workTypes.forEach(w=>{types.forEach(t=>{pTotal+=data[`${emp}|${p}|${t}|${w}|`]||0;});});if(pTotal===0)return;let html=`<div class="summary-box"><p style="margin: 0 0 12px; font-weight: 500;">${p}</p>`;workTypes.forEach(w=>{let wTotal=0;types.forEach(t=>{wTotal+=data[`${emp}|${p}|${t}|${w}|`]||0;});if(wTotal>0){html+=`<div style="margin-bottom: 12px;"><p style="font-size: 11px; color: #999; margin: 0 0 6px;">${w}</p><p style="margin: 0; font-weight: 500;">${wTotal.toFixed(2)}h</p></div>`;}});html+=`<div style="border-top: 1px solid #ddd; padding-top: 8px; display: flex; justify-content: space-between; font-size: 12px; font-weight: 500;"><span>Project total</span><span>${pTotal.toFixed(2)}h</span></div></div>`;con.innerHTML+=html;});}function exportCSV(){let csv='Date,Employee,Project,Work Type,Category,Office,Shop,Onsite,Travel,Total Hours\n';const employees=['Fred','Jim','Laura','Mark','Jeff','Rich','Cody','Darin','Kate','Tony'];employees.forEach(e=>{projects.forEach(p=>{workTypes.forEach(w=>{let vals={Office:0,Shop:0,Onsite:0,Travel:0};types.forEach(t=>{vals[t]=data[`${e}|${p}|${t}|${w}|`]||0;});let total=Object.values(vals).reduce((a,b)=>a+b,0);if(total>0){csv+=`${currentDate},${e},${p},${w},,${vals.Office.toFixed(2)},${vals.Shop.toFixed(2)},${vals.Onsite.toFixed(2)},${vals.Travel.toFixed(2)},${total.toFixed(2)}\n`;}});});});const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`zottola_hours_${currentDate}.csv`;a.click();}function addProject(){const inp=document.getElementById('newProjectInput');if(inp.value.trim()&&!projects.includes(inp.value.trim())){projects.push(inp.value.trim());localStorage.setItem('zottola_projects',JSON.stringify(projects));inp.value='';renderSelects();updateProjectList();}}function deleteProject(p){if(confirm(`Delete "${p}"?`)){projects=projects.filter(x=>x!==p);localStorage.setItem('zottola_projects',JSON.stringify(projects));renderSelects();updateProjectList();}}function resetProjects(){if(confirm('Reset to default 6 projects?')){projects=defaultProjects;localStorage.setItem('zottola_projects',JSON.stringify(projects));renderSelects();updateProjectList();}}function addWorkType(){const inp=document.getElementById('newWorkTypeInput');if(inp.value.trim()&&!workTypes.includes(inp.value.trim())){workTypes.push(inp.value.trim());localStorage.setItem('zottola_workTypes',JSON.stringify(workTypes));inp.value='';renderSelects();updateWorkTypeList();}}function deleteWorkType(w){if(confirm(`Delete "${w}"?`)){workTypes=workTypes.filter(x=>x!==w);localStorage.setItem('zottola_workTypes',JSON.stringify(workTypes));renderSelects();updateWorkTypeList();}}function resetWorkTypes(){if(confirm('Reset to default work types?')){workTypes=defaultWorkTypes;localStorage.setItem('zottola_workTypes',JSON.stringify(workTypes));renderSelects();updateWorkTypeList();}}function updateProjectList(){const list=document.getElementById('projectList');list.innerHTML=projects.map(p=>`<div class="project-item"><span>${p}</span><button class="delete-btn" onclick="deleteProject('${p}')">Delete</button></div>`).join('');document.getElementById('projectCount').textContent=projects.length;document.getElementById('settingsProjects').textContent=projects.length;}function updateWorkTypeList(){const list=document.getElementById('workTypeList');list.innerHTML=workTypes.map(w=>`<div class="project-item"><span>${w}</span><button class="delete-btn" onclick="deleteWorkType('${w}')">Delete</button></div>`).join('');document.getElementById('workTypeCount').textContent=workTypes.length;document.getElementById('settingsWorkTypes').textContent=workTypes.length;}function switchTab(tab){document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));document.getElementById(tab).classList.add('active');event.target.classList.add('active');if(tab==='summary')updateSummaryView();if(tab==='week')updateWeekView();}function clearDateData(){if(confirm(`Clear data for ${currentDate}?`)){localStorage.removeItem(getStorageKey(currentDate));data={};renderManualInputs();updateSummary();}}init();
</script>
</body>
</html>
