<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zottola Shop Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabler-icons@latest/tabler-icons.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    #root { padding: 1rem; max-width: 100%; }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #f0f0f0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const React = window.React;
    const { useState, useEffect } = React;
    const ReactDOM = window.ReactDOM;

    function ShopTracker() {
      const defaultProjects = [
        '100 Industry Drive Hazelwood',
        '28th Street Bridge',
        'Alpine Lodge',
        'BBL',
        'Cecil Township',
        'Crile',
        'Daloia Residence',
        'GSL',
        'Gardian',
        'General',
        'Hickory Rail',
        'Hosch',
        'House Josh Rail',
        'House Rail',
        'Innovative',
        'Jadhav',
        'Jendoco',
        'Leetsdale',
        'MA Dunn Construction',
        'Manthy',
        'Miike Wertz',
        'Minerd',
        'Minerd 188571-1',
        'Minerd 192258',
        'Minerd 195298',
        'Noble Residence',
        'Other',
        'Shop Work'
      ];

      const defaultWorkTypes = ['Beams', 'Plates', 'Miscellaneous'];

      const defaultConfig = {
        employees: [
          { name: 'Fred', rate: 46.18 },
          { name: 'Jim', rate: 51.66 },
          { name: 'Laura', rate: 46.18 },
          { name: 'Mark', rate: 32.30 },
          { name: 'Jeff', rate: 38.58 },
          { name: 'Rich', rate: 38.58 },
          { name: 'Cody', rate: 29.07 },
          { name: 'Darin', rate: 30.03 },
          { name: 'Kate', rate: 30.03 },
          { name: 'Tony', rate: 25.84 }
        ]
      };

      const types = ['Office', 'Shop', 'Onsite', 'Travel'];
      const [projects, setProjects] = useState(() => {
        const stored = localStorage.getItem('zottola_projects');
        return stored ? JSON.parse(stored) : defaultProjects;
      });
      const [workTypes, setWorkTypes] = useState(() => {
        const stored = localStorage.getItem('zottola_workTypes');
        return stored ? JSON.parse(stored) : defaultWorkTypes;
      });
      const [emp, setEmp] = useState(defaultConfig.employees[0].name);
      const [proj, setProj] = useState(projects[0] || defaultProjects[0]);
      const [workType, setWorkType] = useState(workTypes[0] || defaultWorkTypes[0]);
      const [data, setData] = useState({});
      const [view, setView] = useState('track');
      const [newProject, setNewProject] = useState('');
      const [newWorkType, setNewWorkType] = useState('');

      const today = new Date().toISOString().split('T')[0];
      const storageKey = `zottola_hours_${today}`;

      useEffect(() => {
        const stored = localStorage.getItem(storageKey);
        if (stored) setData(JSON.parse(stored));
      }, []);

      useEffect(() => {
        localStorage.setItem(storageKey, JSON.stringify(data));
      }, [data]);

      useEffect(() => {
        localStorage.setItem('zottola_projects', JSON.stringify(projects));
      }, [projects]);

      useEffect(() => {
        localStorage.setItem('zottola_workTypes', JSON.stringify(workTypes));
      }, [workTypes]);

      const addProject = () => {
        if (newProject.trim() && !projects.includes(newProject.trim())) {
          setProjects([...projects, newProject.trim()]);
          setNewProject('');
        }
      };

      const deleteProject = (projectName) => {
        if (confirm(`Delete "${projectName}"?`)) {
          setProjects(projects.filter(p => p !== projectName));
          if (proj === projectName && projects.length > 1) {
            setProj(projects[0]);
          }
        }
      };

      const resetProjects = () => {
        if (confirm('Reset to default 28 projects?')) {
          setProjects(defaultProjects);
          setProj(defaultProjects[0]);
        }
      };

      const addWorkType = () => {
        if (newWorkType.trim() && !workTypes.includes(newWorkType.trim())) {
          setWorkTypes([...workTypes, newWorkType.trim()]);
          setNewWorkType('');
        }
      };

      const deleteWorkType = (wType) => {
        if (confirm(`Delete "${wType}"?`)) {
          setWorkTypes(workTypes.filter(w => w !== wType));
          if (workType === wType && workTypes.length > 1) {
            setWorkType(workTypes[0]);
          }
        }
      };

      const resetWorkTypes = () => {
        if (confirm('Reset to default work types?')) {
          setWorkTypes(defaultWorkTypes);
          setWorkType(defaultWorkTypes[0]);
        }
      };

      const key = (e, p, t, w) => `${e}|${p}|${t}|${w}`;
      const getRate = () => defaultConfig.employees.find(x => x.name === emp)?.rate || 0;
      
      const addHours = (e, p, t, w, n) => {
        setData(prev => {
          const k = key(e, p, t, w);
          return { ...prev, [k]: Math.max(0, (prev[k] || 0) + n) };
        });
      };

      const getWorkTypeTotals = (e, p, w) => {
        let hours = 0;
        types.forEach(t => {
          hours += data[key(e, p, t, w)] || 0;
        });
        return hours;
      };

      const getProjectTotals = (e, p) => {
        let hours = 0;
        workTypes.forEach(w => {
          types.forEach(t => {
            hours += data[key(e, p, t, w)] || 0;
          });
        });
        return hours;
      };

      const exportCSV = () => {
        let csv = 'Date,Employee,Project,Work Type,Office,Shop,Onsite,Travel,Total Hours\n';
        
        defaultConfig.employees.forEach(e => {
          projects.forEach(p => {
            workTypes.forEach(w => {
              const vals = { Office: 0, Shop: 0, Onsite: 0, Travel: 0 };
              types.forEach(t => {
                vals[t] = data[key(e.name, p, t, w)] || 0;
              });
              const totalHours = Object.values(vals).reduce((a, b) => a + b, 0);
              if (totalHours > 0) {
                csv += `${today},${e.name},${p},${w},${vals.Office.toFixed(2)},${vals.Shop.toFixed(2)},${vals.Onsite.toFixed(2)},${vals.Travel.toFixed(2)},${totalHours.toFixed(2)}\n`;
              }
            });
          });
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `zottola_hours_${today}.csv`;
        a.click();
      };

      return (
        <div style={{ background: 'var(--color-background-primary)', padding: '1rem', borderRadius: 'var(--border-radius-lg)' }}>
          <div style={{ marginBottom: '1.5rem', paddingBottom: '1rem', borderBottom: '0.5px solid var(--color-border-tertiary)', textAlign: 'center' }}>
            <img src="Zottola_Fab.jpg" style={{ maxWidth: '80px', height: 'auto', marginBottom: '0.5rem' }} alt="Zottola Fab Logo" />
            <h2 style={{ margin: 0, fontSize: '18px', fontWeight: 500 }}>Shop Tracker</h2>
            <p style={{ fontSize: '12px', color: 'var(--color-text-secondary)', margin: '4px 0 0' }}>
              {new Date().toLocaleDateString()}
            </p>
          </div>

          <div style={{ display: 'flex', gap: '8px', marginBottom: '1.5rem', borderBottom: '0.5px solid var(--color-border-tertiary)', overflowX: 'auto' }}>
            {['track', 'summary', 'admin', 'settings'].map(v => (
              <button
                key={v}
                onClick={() => setView(v)}
                style={{
                  border: 'none',
                  background: 'transparent',
                  padding: '8px 0',
                  borderBottom: view === v ? '2px solid var(--color-text-primary)' : 'none',
                  fontSize: '13px',
                  fontWeight: view === v ? 500 : 400,
                  color: view === v ? 'var(--color-text-primary)' : 'var(--color-text-secondary)',
                  cursor: 'pointer',
                  whiteSpace: 'nowrap'
                }}
              >
                {v.charAt(0).toUpperCase() + v.slice(1)}
              </button>
            ))}
          </div>

          {view === 'track' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '1.5rem' }}>
              <div>
                <label style={{ display: 'block', fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px', fontWeight: 500 }}>
                  Who is working?
                </label>
                <select
                  value={emp}
                  onChange={(e) => setEmp(e.target.value)}
                  style={{
                    width: '100%',
                    padding: '10px',
                    fontSize: '16px',
                    border: '0.5px solid var(--color-border-secondary)',
                    borderRadius: 'var(--border-radius-md)',
                    background: 'var(--color-background-primary)'
                  }}
                >
                  {defaultConfig.employees.map(e => (
                    <option key={e.name} value={e.name}>{e.name}</option>
                  ))}
                </select>
              </div>

              <div>
                <label style={{ display: 'block', fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px', fontWeight: 500 }}>
                  Current project
                </label>
                <select
                  value={proj}
                  onChange={(e) => setProj(e.target.value)}
                  style={{
                    width: '100%',
                    padding: '10px',
                    fontSize: '16px',
                    border: '0.5px solid var(--color-border-secondary)',
                    borderRadius: 'var(--border-radius-md)',
                    background: 'var(--color-background-primary)'
                  }}
                >
                  {projects.map(p => (
                    <option key={p} value={p}>{p}</option>
                  ))}
                </select>
              </div>

              <div>
                <label style={{ display: 'block', fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px', fontWeight: 500 }}>
                  Work type
                </label>
                <select
                  value={workType}
                  onChange={(e) => setWorkType(e.target.value)}
                  style={{
                    width: '100%',
                    padding: '10px',
                    fontSize: '16px',
                    border: '0.5px solid var(--color-border-secondary)',
                    borderRadius: 'var(--border-radius-md)',
                    background: 'var(--color-background-primary)'
                  }}
                >
                  {workTypes.map(w => (
                    <option key={w} value={w}>{w}</option>
                  ))}
                </select>
              </div>

              <div>
                <p style={{ fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '12px', fontWeight: 500 }}>
                  Add hours
                </p>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px', marginBottom: '12px' }}>
                  {types.map(t => (
                    <div key={t} style={{ display: 'flex', gap: '6px' }}>
                      <button
                        onClick={() => addHours(emp, proj, t, workType, 0.5)}
                        style={{
                          flex: 1,
                          padding: '12px 8px',
                          fontSize: '13px',
                          fontWeight: 500,
                          border: '0.5px solid var(--color-border-secondary)',
                          background: 'var(--color-background-primary)',
                          borderRadius: 'var(--border-radius-md)',
                          cursor: 'pointer',
                          minHeight: '44px'
                        }}
                      >
                        +0.5h {t}
                      </button>
                      <button
                        onClick={() => addHours(emp, proj, t, workType, 1)}
                        style={{
                          flex: 1,
                          padding: '12px 8px',
                          fontSize: '13px',
                          fontWeight: 500,
                          border: '0.5px solid var(--color-border-secondary)',
                          background: 'var(--color-background-primary)',
                          borderRadius: 'var(--border-radius-md)',
                          cursor: 'pointer',
                          minHeight: '44px'
                        }}
                      >
                        +1h
                      </button>
                    </div>
                  ))}
                </div>

                <p style={{ fontSize: '12px', color: 'var(--color-text-secondary)', margin: '12px 0 8px' }}>
                  Manual adjustment
                </p>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
                  {types.map(t => (
                    <div key={t}>
                      <label style={{ display: 'block', fontSize: '11px', color: 'var(--color-text-secondary)', marginBottom: '4px' }}>
                        {t}
                      </label>
                      <input
                        type="number"
                        step="0.25"
                        min="0"
                        value={data[key(emp, proj, t, workType)] || 0}
                        onChange={(e) => {
                          const newVal = parseFloat(e.target.value) || 0;
                          const curVal = data[key(emp, proj, t, workType)] || 0;
                          addHours(emp, proj, t, workType, newVal - curVal);
                        }}
                        style={{
                          width: '100%',
                          padding: '8px',
                          fontSize: '14px',
                          border: '0.5px solid var(--color-border-secondary)',
                          borderRadius: 'var(--border-radius-md)',
                          background: 'var(--color-background-primary)',
                          boxSizing: 'border-box'
                        }}
                      />
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ background: 'var(--color-background-secondary)', padding: '1rem', borderRadius: 'var(--border-radius-md)', border: '0.5px solid var(--color-border-tertiary)' }}>
                <p style={{ fontSize: '12px', color: 'var(--color-text-secondary)', margin: '0 0 8px', textTransform: 'uppercase' }}>
                  {proj} - {workType}
                </p>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '12px' }}>
                  {types.map(t => (
                    <div key={t} style={{ background: 'var(--color-background-primary)', padding: '12px', borderRadius: 'var(--border-radius-md)', textAlign: 'center', border: '0.5px solid var(--color-border-tertiary)' }}>
                      <p style={{ fontSize: '10px', color: 'var(--color-text-secondary)', margin: '0 0 6px', fontWeight: 500 }}>{t}</p>
                      <p style={{ fontSize: '18px', fontWeight: 500, margin: 0 }}>
                        {(data[key(emp, proj, t, workType)] || 0).toFixed(1)}h
                      </p>
                    </div>
                  ))}
                </div>
              </div>

              <button
                onClick={exportCSV}
                style={{
                  width: '100%',
                  padding: '12px',
                  fontSize: '14px',
                  fontWeight: 500,
                  border: '0.5px solid var(--color-border-secondary)',
                  background: 'var(--color-background-primary)',
                  borderRadius: 'var(--border-radius-md)',
                  cursor: 'pointer',
                  minHeight: '44px'
                }}
              >
                Export
              </button>
            </div>
          )}

          {view === 'summary' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
              <div>
                <label style={{ display: 'block', fontSize: '13px', color: 'var(--color-text-secondary)', marginBottom: '8px', fontWeight: 500 }}>
                  View for
                </label>
                <select
                  value={emp}
                  onChange={(e) => setEmp(e.target.value)}
                  style={{
                    width: '100%',
                    padding: '10px',
                    fontSize: '16px',
                    border: '0.5px solid var(--color-border-secondary)',
                    borderRadius: 'var(--border-radius-md)',
                    background: 'var(--color-background-primary)'
                  }}
                >
                  {defaultConfig.employees.map(e => (
                    <option key={e.name} value={e.name}>{e.name}</option>
                  ))}
                </select>
              </div>

              <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                {projects.map(p => {
                  const pTotals = getProjectTotals(emp, p);
                  if (pTotals === 0) return null;
                  
                  return (
                    <div key={p} style={{ background: 'var(--color-background-secondary)', padding: '12px', borderRadius: 'var(--border-radius-md)', border: '0.5px solid var(--color-border-tertiary)' }}>
                      <p style={{ fontSize: '13px', fontWeight: 500, margin: '0 0 12px' }}>{p}</p>
                      
                      {workTypes.map(w => {
                        const wTotals = getWorkTypeTotals(emp, p, w);
                        if (wTotals === 0) return null;
                        
                        return (
                          <div key={w} style={{ marginBottom: '12px', paddingBottom: '12px', borderBottom: '0.5px solid var(--color-border-tertiary)' }}>
                            <p style={{ fontSize: '11px', color: 'var(--color-text-secondary)', margin: '0 0 6px', fontWeight: 500 }}>{w}</p>
                            <p style={{ fontSize: '14px', fontWeight: 500 }}>{wTotals.toFixed(1)}h</p>
                          </div>
                        );
                      })}
                      
                      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '12px', fontWeight: 500, paddingTop: '8px' }}>
                        <span>Project total</span>
                        <span>{pTotals.toFixed(1)}h</span>
                      </div>
                    </div>
                  );
                })}
              </div>

              <button
                onClick={exportCSV}
                style={{
                  width: '100%',
                  padding: '12px',
                  fontSize: '14px',
                  fontWeight: 500,
                  border: '0.5px solid var(--color-border-secondary)',
                  background: 'var(--color-background-primary)',
                  borderRadius: 'var(--border-radius-md)',
                  cursor: 'pointer',
                  minHeight: '44px'
                }}
              >
                Export
              </button>
            </div>
          )}

          {view === 'admin' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
              <div style={{ background: 'var(--color-background-info)', padding: '12px', borderRadius: 'var(--border-radius-md)', fontSize: '13px', color: 'var(--color-text-info)' }}>
                <p style={{ margin: '0 0 8px', fontWeight: 500 }}>Manage Projects</p>
                <p style={{ margin: 0 }}>Current projects: {projects.length}</p>
              </div>

              <div style={{ display: 'flex', gap: '8px' }}>
                <input
                  type="text"
                  placeholder="New project name"
                  value={newProject}
                  onChange={(e) => setNewProject(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && addProject()}
                  style={{
                    flex: 1,
                    padding: '10px',
                    fontSize: '14px',
                    border: '0.5px solid var(--color-border-secondary)',
                    borderRadius: 'var(--border-radius-md)',
                    background: 'var(--color-background-primary)'
                  }}
                />
                <button
                  onClick={addProject}
                  style={{
                    padding: '10px 16px',
                    fontSize: '14px',
                    fontWeight: 500,
                    border: '0.5px solid var(--color-border-secondary)',
                    background: 'var(--color-background-primary)',
                    borderRadius: 'var(--border-radius-md)',
                    cursor: 'pointer',
                    minHeight: '44px'
                  }}
                >
                  Add
                </button>
              </div>

              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', maxHeight: '300px', overflowY: 'auto' }}>
                {projects.map(p => (
                  <div key={p} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px', background: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', border: '0.5px solid var(--color-border-tertiary)', fontSize: '13px' }}>
                    <span>{p}</span>
                    <button
                      onClick={() => deleteProject(p)}
                      style={{
                        padding: '6px 12px',
                        fontSize: '12px',
                        fontWeight: 500,
                        border: '0.5px solid var(--color-border-warning)',
                        background: 'transparent',
                        color: 'var(--color-text-warning)',
                        borderRadius: 'var(--border-radius-md)',
                        cursor: 'pointer'
                      }}
                    >
                      Delete
                    </button>
                  </div>
                ))}
              </div>

              <button
                onClick={resetProjects}
                style={{
                  width: '100%',
                  padding: '12px',
                  fontSize: '14px',
                  fontWeight: 500,
                  border: '0.5px solid var(--color-border-secondary)',
                  background: 'var(--color-background-primary)',
                  borderRadius: 'var(--border-radius-md)',
                  cursor: 'pointer',
                  minHeight: '44px'
                }}
              >
                Reset projects to defaults
              </button>

              <div style={{ background: 'var(--color-background-info)', padding: '12px', borderRadius: 'var(--border-radius-md)', fontSize: '13px', color: 'var(--color-text-info)', marginTop: '1rem' }}>
                <p style={{ margin: '0 0 8px', fontWeight: 500 }}>Manage Work Types</p>
                <p style={{ margin: 0 }}>Current types: {workTypes.length}</p>
              </div>

              <div style={{ display: 'flex', gap: '8px' }}>
                <input
                  type="text"
                  placeholder="New work type"
                  value={newWorkType}
                  onChange={(e) => setNewWorkType(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && addWorkType()}
                  style={{
                    flex: 1,
                    padding: '10px',
                    fontSize: '14px',
                    border: '0.5px solid var(--color-border-secondary)',
                    borderRadius: 'var(--border-radius-md)',
                    background: 'var(--color-background-primary)'
                  }}
                />
                <button
                  onClick={addWorkType}
                  style={{
                    padding: '10px 16px',
                    fontSize: '14px',
                    fontWeight: 500,
                    border: '0.5px solid var(--color-border-secondary)',
                    background: 'var(--color-background-primary)',
                    borderRadius: 'var(--border-radius-md)',
                    cursor: 'pointer',
                    minHeight: '44px'
                  }}
                >
                  Add
                </button>
              </div>

              <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', maxHeight: '300px', overflowY: 'auto' }}>
                {workTypes.map(w => (
                  <div key={w} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '10px', background: 'var(--color-background-secondary)', borderRadius: 'var(--border-radius-md)', border: '0.5px solid var(--color-border-tertiary)', fontSize: '13px' }}>
                    <span>{w}</span>
                    <button
                      onClick={() => deleteWorkType(w)}
                      style={{
                        padding: '6px 12px',
                        fontSize: '12px',
                        fontWeight: 500,
                        border: '0.5px solid var(--color-border-warning)',
                        background: 'transparent',
                        color: 'var(--color-text-warning)',
                        borderRadius: 'var(--border-radius-md)',
                        cursor: 'pointer'
                      }}
                    >
                      Delete
                    </button>
                  </div>
                ))}
              </div>

              <button
                onClick={resetWorkTypes}
                style={{
                  width: '100%',
                  padding: '12px',
                  fontSize: '14px',
                  fontWeight: 500,
                  border: '0.5px solid var(--color-border-secondary)',
                  background: 'var(--color-background-primary)',
                  borderRadius: 'var(--border-radius-md)',
                  cursor: 'pointer',
                  minHeight: '44px'
                }}
              >
                Reset work types to defaults
              </button>
            </div>
          )}

          {view === 'settings' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
              <div style={{ background: 'var(--color-background-info)', padding: '12px', borderRadius: 'var(--border-radius-md)', fontSize: '13px', color: 'var(--color-text-info)' }}>
                <p style={{ margin: '0 0 8px', fontWeight: 500 }}>App Status</p>
                <p style={{ margin: '0 0 4px' }}>Employees: {defaultConfig.employees.length}</p>
                <p style={{ margin: '0 0 4px' }}>Projects: {projects.length}</p>
                <p style={{ margin: 0 }}>Work Types: {workTypes.length}</p>
              </div>

              <button
                onClick={() => {
                  if (confirm('Clear today data?')) {
                    localStorage.removeItem(storageKey);
                    setData({});
                  }
                }}
                style={{
                  width: '100%',
                  padding: '12px',
                  fontSize: '14px',
                  fontWeight: 500,
                  border: '0.5px solid var(--color-border-warning)',
                  background: 'transparent',
                  color: 'var(--color-text-warning)',
                  borderRadius: 'var(--border-radius-md)',
                  cursor: 'pointer',
                  minHeight: '44px'
                }}
              >
                Clear today data
              </button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ShopTracker />);
  </script>
</body>
</html>
