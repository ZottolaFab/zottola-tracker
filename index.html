<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zottola Fab Shop Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 1rem; }
.container { max-width: 100%; background: white; border-radius: 8px; padding: 1rem; }
.header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0; }
.header img { max-width: 80px; margin-bottom: 0.5rem; }
.header h2 { font-size: 18px; margin: 0 0 4px 0; }
.date-selector { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0; }
.date-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.date-controls input[type="date"] { padding: 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px; }
.date-display { font-size: 13px; color: #666; font-weight: 500; padding: 0 8px; }
.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
.tab-btn { border: none; background: transparent; padding: 8px 0; font-size: 13px; cursor: pointer; color: #999; white-space: nowrap; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #333; border-bottom-color: #333; font-weight: 500; }
.tab-content { display: none; }
.tab-content.active { display: block; }
label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
select, input[type="text"], input[type="number"] { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; background: white; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
button { padding: 10px 16px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; min-height: 44px; }
button:hover { background: #f5f5f5; }
.summary-box { background: #f9f9f9; padding: 1rem; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 1rem; }
.summary-title { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 8px; }
.hours-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.hour-box { background: white; padding: 12px; border-radius: 4px; border: 1px solid #e0e0e0; text-align: center; }
.hour-label { font-size: 10px; color: #999; margin-bottom: 6px; }
.hour-value { font-size: 18px; font-weight: 500; }
.info-box { background: #e3f2fd; padding: 12px; border-radius: 4px; font-size: 13px; color: #1976d2; margin-bottom: 1rem; }
.project-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.project-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f9f9f9; border-radius: 4px; border: 1px solid #e0e0e0; font-size: 13px; }
.delete-btn { padding: 6px 12px; font-size: 12px; border: 1px solid #f44336; background: transparent; color: #f44336; }
.warning-btn { border: 1px solid #f44336; color: #f44336; background: transparent; }
.week-view-header { font-size: 14px; font-weight: 600; margin: 1.5rem 0 1rem 0; padding: 1rem; background: #f0f0f0; border-radius: 4px; }
.day-box { background: #f9f9f9; padding: 1rem; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 1rem; }
.day-header { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #333; }
.project-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #e0e0e0; }
.project-row:last-child { border-bottom: none; }
.day-total { padding: 8px 0; margin-top: 8px; border-top: 2px solid #e0e0e0; font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; }
.week-total { background: #e3f2fd; padding: 1rem; border-radius: 4px; font-size: 14px; font-weight: 600; margin-top: 1rem; display: flex; justify-content: space-between; color: #1976d2; }
.export-section { background: #f0f7ff; padding: 1rem; border-radius: 4px; border: 1px solid #b3d9ff; margin-bottom: 1rem; }
.export-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; margin-top: 1rem; }
@media (prefers-color-scheme: dark) {
body { background: #1a1a1a; }
.container { background: #2a2a2a; color: #f0f0f0; }
select, input[type="text"], input[type="number"], input[type="date"] { background: #333; color: #f0f0f0; border-color: #444; }
button { background: #333; color: #f0f0f0; border-color: #444; }
button:hover { background: #444; }
.summary-box { background: #333; border-color: #444; }
.hour-box { background: #2a2a2a; border-color: #444; }
.project-item { background: #333; border-color: #444; }
.info-box { background: #1a3a52; color: #90caf9; }
.date-display { color: #bbb; }
.day-box { background: #333; border-color: #444; }
.project-row { border-bottom-color: #444; }
.day-total { border-top-color: #444; }
.week-view-header { background: #444; }
.export-section { background: #1a3a52; border-color: #2a5a8a; }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<img src="Zottola_Fab.jpg" alt="Zottola Fab Logo" onerror="this.style.display='none'">
<h2>Zottola Fab Shop Tracker</h2>
</div>
<div class="date-selector">
<div class="date-controls">
<span class="date-display" id="dateDisplay"></span>
<input type="date" id="dateInput" onchange="jumpToDate()">
</div>
</div>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('track')">Track</button>
<button class="tab-btn" onclick="switchTab('week')">Week View</button>
<button class="tab-btn" onclick="switchTab('summary')">Summary</button>
<button class="tab-btn" onclick="switchTab('export')">Export</button>
<button class="tab-btn" onclick="switchTab('admin')">Admin</button>
<button class="tab-btn" onclick="switchTab('settings')">Settings</button>
</div>
<div id="track" class="tab-content active">
