<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zottola Fab Shop Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; padding: 1rem; }
.container { max-width: 100%; background: white; border-radius: 8px; padding: 1rem; }
.header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0; }
.header img { max-width: 80px; margin-bottom: 0.5rem; }
.header h2 { font-size: 18px; margin: 0 0 4px 0; }
.header p { font-size: 12px; color: #999; margin: 0; }
.date-selector { margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #e0e0e0; }
.date-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.date-controls button { padding: 8px 12px; font-size: 13px; border: 1px solid #ddd; background: white; border-radius: 4px; cursor: pointer; }
.date-controls button:hover { background: #f5f5f5; }
.date-controls input[type="date"] { padding: 8px; font-size: 13px; border: 1px solid #ddd; border-radius: 4px; }
.date-display { font-size: 13px; color: #666; font-weight: 500; padding: 0 8px; }
.tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; overflow-x: auto; }
.tab-btn { border: none; background: transparent; padding: 8px 0; font-size: 13px; cursor: pointer; color: #999; white-space: nowrap; border-bottom: 2px solid transparent; }
.tab-btn.active { color: #333; border-bottom-color: #333; font-weight: 500; }
.tab-content { display: none; }
.tab-content.active { display: block; }
label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
select, input[type="text"], input[type="number"] { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ddd; border-radius: 4px; background: white; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
.grid-4 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
button { padding: 10px 16px; font-size: 14px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; min-height: 44px; }
button:hover { background: #f5f5f5; }
.summary-box { background: #f9f9f9; padding: 1rem; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 1rem; }
.summary-title { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 8px; }
.hours-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.hour-box { background: white; padding: 12px; border-radius: 4px; border: 1px solid #e0e0e0; text-align: center; }
.hour-label { font-size: 10px; color: #999; margin-bottom: 6px; }
.hour-value { font-size: 18px; font-weight: 500; }
.info-box { background: #e3f2fd; padding: 12px; border-radius: 4px; font-size: 13px; color: #1976d2; margin-bottom: 1rem; }
.project-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
.project-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #f9f9f9; border-radius: 4px; border: 1px solid #e0e0e0; font-size: 13px; }
.delete-btn { padding: 6px 12px; font-size: 12px; border: 1px solid #f44336; background: transparent; color: #f44336; }
.warning-btn { border: 1px solid #f44336; color: #f44336; background: transparent; }
.week-view-header { font-size: 14px; font-weight: 600; margin: 1.5rem 0 1rem 0; padding: 1rem; background: #f0f0f0; border-radius: 4px; }
.day-box { background: #f9f9f9; padding: 1rem; border-radius: 4px; border: 1px solid #e0e0e0; margin-bottom: 1rem; }
.day-header { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #333; }
.project-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid #e0e0e0; }
.project-row:last-child { border-bottom: none; }
.day-total { padding: 8px 0; margin-top: 8px; border-top: 2px solid #e0e0e0; font-weight: 600; font-size: 13px; display: flex; justify-content: space-between; }
.week-total { background: #e3f2fd; padding: 1rem; border-radius: 4px; font-size: 14px; font-weight: 600; margin-top: 1rem; display: flex; justify-content: space-between; color: #1976d2; }
@media (prefers-color-scheme: dark) {
body { background: #1a1a1a; }
.container { background: #2a2a2a; color: #f0f0f0; }
select, input[type="text"], input[type="number"], input[type="date"] { background: #333; color: #f0f0f0; border-color: #444; }
button { background: #333; color: #f0f0f0; border-color: #444; }
button:hover { background: #444; }
.summary-box { background: #333; border-color: #444; }
.hour-box { background: #2a2a2a; border-color: #444; }
.project-item { background: #333; border-color: #444; }
.info-box { background: #1a3a52; color: #90caf9; }
.date-display { color: #bbb; }
.day-box { background: #333; border-color: #444; }
.project-row { border-bottom-color: #444; }
.day-total { border-top-color: #444; }
.week-view-header { background: #444; }
}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h2>Zottola Fab Shop Tracker</h2>
</div>
<div class="date-selector">
<div class="date-controls">
<button onclick="goToDate('prev')">← Prior Day</button>
<input type="date" id="dateInput" onchange="jumpToDate()">
<button onclick="goToDate('today')">Today</button>
<button onclick="goToDate('next')">Next Day →</button>
<span class="date-display" id="dateDisplay"></span>
</div>
</div>
<div class="tabs">
<button class="tab-btn active" onclick="switchTab('track', this)">Track</button>
<button class="tab-btn" onclick="switchTab('week', this)">Week View</button>
<button class="tab-btn" onclick="switchTab('summary', this)">Summary</button>
<button class="tab-btn" onclick="switchTab('admin', this)">Admin</button>
<button class="tab-btn" onclick="switchTab('settings', this)">Settings</button>
</div>
<div id="track" class="tab-content active">
<div class="grid-2">
<div><label>Who is working?</label><select id="emp" onchange="saveState()"></select></div>
<div><label>Current project</label><select id="proj" onchange="saveState()"></select></div>
</div>
<div class="grid-2">
<div><label>Work type</label><select id="workType" onchange="saveState()"></select></div>
<div><label>Category</label><input type="text" id="category" placeholder="Optional" onchange="onCategoryChange()"></div>
</div>
<div style="margin-top: 1.5rem;"><p style="font-size: 13px; color: #666; margin-bottom: 12px; font-weight: 500;">Quick Adjustment</p><div class="grid-4" id="quickButtons"></div><p style="font-size: 12px; color: #666; margin: 12px 0 8px;">Manual adjustment</p><div class="grid-4" id="manualInputs"></div></div>
<div class="summary-box" style="margin-top: 1.5rem;"><div class="summary-title" id="summaryTitle"></div><div class="hours-grid" id="summaryHours"></div></div>
<button onclick="exportLastWeekCSV()" style="width: 100%; margin-top: 1rem; font-weight: 600;">📄 Monday export — last week (for master sheet)</button>
<button onclick="exportWeekCSV()" style="width: 100%; margin-top: 8px;">Weekly CSV (selected week)</button>
<button onclick="exportCSV()" style="width: 100%; margin-top: 8px;">Export this date</button>
<button onclick="exportAllCSV()" style="width: 100%; margin-top: 8px;">Export all dates</button>
</div>
<div id="week" class="tab-content">
<div><label>View week for</label><select id="weekEmp" onchange="updateWeekView()"></select></div>
<div id="weekContent"></div>
</div>
<div id="summary" class="tab-content">
<div><label>View for (selected date)</label><select id="summaryEmp" onchange="updateSummaryView()"></select></div>
<div id="summaryContent" style="margin-top: 1rem;"></div>
<button onclick="exportLastWeekCSV()" style="width: 100%; margin-top: 1rem; font-weight: 600;">📄 Monday export — last week (for master sheet)</button>
<button onclick="exportWeekCSV()" style="width: 100%; margin-top: 8px;">Weekly CSV (selected week)</button>
<button onclick="exportCSV()" style="width: 100%; margin-top: 8px;">Export this date</button>
<button onclick="exportAllCSV()" style="width: 100%; margin-top: 8px;">Export all dates</button>
</div>
<div id="admin" class="tab-content">
<div class="info-box">Manage Projects<br>Current: <span id="projectCount">0</span></div>
<div style="display: flex; gap: 8px; margin-bottom: 1rem;"><input type="text" id="newProjectInput" placeholder="New project name"><button onclick="addProject()">Add</button></div>
<div class="project-list" id="projectList"></div>
<button onclick="resetProjects()" style="width: 100%; margin-top: 1rem;">Reset projects to defaults</button>
<div class="info-box" style="margin-top: 1rem;">Manage Work Types<br>Current: <span id="workTypeCount">0</span></div>
<div style="display: flex; gap: 8px; margin-bottom: 1rem;"><input type="text" id="newWorkTypeInput" placeholder="New work type"><button onclick="addWorkType()">Add</button></div>
<div class="project-list" id="workTypeList"></div>
<button onclick="resetWorkTypes()" style="width: 100%; margin-top: 1rem;">Reset work types to defaults</button>
</div>
<div id="settings" class="tab-content">
<div class="info-box">App Status<br>Employees: 10<br>Projects: <span id="settingsProjects">0</span><br>Work Types: <span id="settingsWorkTypes">0</span></div>
<p style="font-size: 12px; color: #999;">Time data is kept safe on this device. To remove an individual entry, set its hours to 0 on the Track tab.</p>
</div>
</div>
<script>
const defaultProjects=['100 Industry Drive Hazelwood','28th Street Bridge','Alpine Lodge','BBL','Cecil Township','Crile','Daloia Residence','GSL','Gardian','General','Hickory Rail','Hosch','House Josh Rail','House Rail','Innovative','Jadhav','Jendoco','Leetsdale','MA Dunn Construction','Manthy','Miike Wertz','Minerd','Minerd 188571-1','Minerd 192258','Minerd 195298','Noble Residence','Other','Shop Work'];
const defaultWorkTypes=['Beams','Plates','Miscellaneous'];
const employees=['Fred','Jim','Laura','Mark','Jeff','Rich','Cody','Darin','Kate','Tony'];
const types=['Office','Shop','Onsite','Travel'];
let currentDate=new Date().toISOString().split('T')[0];
let projects=JSON.parse(localStorage.getItem('zottola_projects'))||defaultProjects;
let workTypes=JSON.parse(localStorage.getItem('zottola_workTypes'))||defaultWorkTypes;
let data={};

// ---- helpers ----
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function csvEscape(s){s=String(s);return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
function cleanField(s){return String(s).replace(/\|/g,' ').trim();} // '|' is the key delimiter, strip it from user input
function getStorageKey(dateStr){return `zottola_hours_${dateStr}`;}
function loadDataForDate(dateStr){data=JSON.parse(localStorage.getItem(getStorageKey(dateStr)))||{};}
function saveData(){localStorage.setItem(getStorageKey(currentDate),JSON.stringify(data));}

// ---- date handling ----
function setCurrentDate(dateStr){currentDate=dateStr;loadDataForDate(dateStr);updateDateDisplay();renderManualInputs();updateSummary();}
function updateDateDisplay(){const d=new Date(currentDate+'T00:00:00');const dayName=d.toLocaleDateString('en-US',{weekday:'long'});const dateStr=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});document.getElementById('dateDisplay').textContent=`${dayName}, ${dateStr}`;document.getElementById('dateInput').value=currentDate;}
function goToDate(dir){let d=new Date(currentDate+'T00:00:00');if(dir==='prev')d.setDate(d.getDate()-1);else if(dir==='next')d.setDate(d.getDate()+1);else if(dir==='today')d=new Date();const newDate=d.toISOString().split('T')[0];setCurrentDate(newDate);}
function jumpToDate(){const dateInput=document.getElementById('dateInput').value;if(dateInput)setCurrentDate(dateInput);}
function getMondayOfWeek(dateStr){const d=new Date(dateStr+'T00:00:00');const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);return new Date(d.setDate(diff)).toISOString().split('T')[0];}
function getDateRange(startDate){const dates=[];for(let i=0;i<6;i++){const d=new Date(startDate+'T00:00:00');d.setDate(d.getDate()+i);dates.push(d.toISOString().split('T')[0]);}return dates;}

// ---- init ----
function init(){renderSelects();renderQuickButtons();renderManualInputs();updateProjectList();updateWorkTypeList();loadState();setCurrentDate(new Date().toISOString().split('T')[0]);}
function saveState(){saveData();updateSummary();}
function onCategoryChange(){const c=document.getElementById('category');c.value=cleanField(c.value);renderManualInputs();updateSummary();}
function loadState(){const emp=localStorage.getItem('zottola_emp');const proj=localStorage.getItem('zottola_proj');const workType=localStorage.getItem('zottola_workType');if(emp&&employees.includes(emp))document.getElementById('emp').value=emp;if(proj&&projects.includes(proj))document.getElementById('proj').value=proj;if(workType&&workTypes.includes(workType))document.getElementById('workType').value=workType;}
function renderSelects(){
  const cur={proj:document.getElementById('proj').value,workType:document.getElementById('workType').value};
  document.getElementById('emp').innerHTML=employees.map(e=>`<option>${escapeHtml(e)}</option>`).join('');
  document.getElementById('proj').innerHTML=projects.map(p=>`<option>${escapeHtml(p)}</option>`).join('');
  document.getElementById('workType').innerHTML=workTypes.map(w=>`<option>${escapeHtml(w)}</option>`).join('');
  document.getElementById('summaryEmp').innerHTML=employees.map(e=>`<option>${escapeHtml(e)}</option>`).join('');
  document.getElementById('weekEmp').innerHTML=employees.map(e=>`<option>${escapeHtml(e)}</option>`).join('');
  if(projects.includes(cur.proj))document.getElementById('proj').value=cur.proj;
  if(workTypes.includes(cur.workType))document.getElementById('workType').value=cur.workType;
}
function renderQuickButtons(){const btn=document.getElementById('quickButtons');btn.innerHTML=types.map(t=>`<div style="display: flex; gap: 6px;"><button onclick="addHours('${t}',0.5)" style="flex: 1;">+0.5h ${t}</button><button onclick="addHours('${t}',1)" style="flex: 1;">+1h ${t}</button></div>`).join('');}
function renderManualInputs(){const inp=document.getElementById('manualInputs');inp.innerHTML=types.map(t=>`<div><label>${t}</label><input type="number" step="0.25" min="0" value="${getHours(t).toFixed(2)}" onchange="setHours('${t}', this.value)"></div>`).join('');}

// ---- entry keys (emp|proj|type|workType|category) ----
function getKey(t){const emp=document.getElementById('emp').value;const proj=document.getElementById('proj').value;const wt=document.getElementById('workType').value;const cat=cleanField(document.getElementById('category').value);return `${emp}|${proj}|${t}|${wt}|${cat}`;}
function getHours(t){return data[getKey(t)]||0;}
function addHours(t,n){const k=getKey(t);data[k]=Math.round(((data[k]||0)+n)*100)/100;saveState();renderManualInputs();}
function setHours(t,v){const k=getKey(t);const val=Math.max(0,parseFloat(v)||0);if(val===0)delete data[k];else data[k]=val;saveState();renderManualInputs();}
function updateSummary(){const emp=document.getElementById('emp').value;const proj=document.getElementById('proj').value;const wt=document.getElementById('workType').value;const cat=document.getElementById('category').value;document.getElementById('summaryTitle').textContent=`${proj} - ${wt}${cat?` - ${cat}`:''}`.toUpperCase();const hg=document.getElementById('summaryHours');hg.innerHTML=types.map(t=>{const hrs=data[getKey(t)]||0;return `<div class="hour-box"><div class="hour-label">${t}</div><div class="hour-value">${hrs.toFixed(2)}h</div></div>`;}).join('');localStorage.setItem('zottola_emp',emp);localStorage.setItem('zottola_proj',proj);localStorage.setItem('zottola_workType',wt);}

// ---- aggregation (sums across all categories, and surfaces orphaned/deleted projects) ----
function parseKey(k){const p=k.split('|');if(p.length<5)return null;return {emp:p[0],proj:p[1],type:p[2],wt:p[3],cat:p.slice(4).join('|')};}
function orderedProjects(found){const ordered=projects.filter(p=>found.has(p));found.forEach(p=>{if(!projects.includes(p))ordered.push(p);});return ordered;}

function updateWeekView(){
  const emp=document.getElementById('weekEmp').value;
  const mondayDate=getMondayOfWeek(currentDate);
  const weekDates=getDateRange(mondayDate);
  const d=new Date(mondayDate+'T00:00:00');
  const weekStr=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  let html=`<div class="week-view-header">${escapeHtml(emp.toUpperCase())} - Week of ${weekStr}</div>`;
  let weekTotalHours=0;
  const dayNames=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  weekDates.forEach((dateStr,idx)=>{
    const dayData=JSON.parse(localStorage.getItem(getStorageKey(dateStr)))||{};
    const projectHours={};
    for(const k in dayData){const e=parseKey(k);if(!e||e.emp!==emp||!types.includes(e.type))continue;projectHours[e.proj]=(projectHours[e.proj]||0)+(dayData[k]||0);}
    const dayTotal=Object.values(projectHours).reduce((a,b)=>a+b,0);
    weekTotalHours+=dayTotal;
    if(dayTotal>0){
      html+=`<div class="day-box"><div class="day-header">${dayNames[idx]}</div>`;
      orderedProjects(new Set(Object.keys(projectHours))).forEach(proj=>{const hrs=projectHours[proj];if(hrs>0)html+=`<div class="project-row"><span>${escapeHtml(proj)}</span><span>${hrs.toFixed(2)}h</span></div>`;});
      html+=`<div class="day-total"><span>Day Total</span><span>${dayTotal.toFixed(2)}h</span></div></div>`;
    }
  });
  html+=`<div class="week-total"><span>Week Total</span><span>${weekTotalHours.toFixed(2)}h</span></div>`;
  document.getElementById('weekContent').innerHTML=html;
}

function updateSummaryView(){
  const emp=document.getElementById('summaryEmp').value;
  const con=document.getElementById('summaryContent');
  const byProj={};
  for(const k in data){const e=parseKey(k);if(!e||e.emp!==emp||!types.includes(e.type))continue;const v=data[k]||0;if(!byProj[e.proj])byProj[e.proj]={total:0,wt:{}};byProj[e.proj].total+=v;byProj[e.proj].wt[e.wt]=(byProj[e.proj].wt[e.wt]||0)+v;}
  const found=new Set(Object.keys(byProj));
  if(found.size===0){con.innerHTML='<div class="summary-box">No hours recorded for this date.</div>';return;}
  let out='';
  orderedProjects(found).forEach(p=>{
    const rec=byProj[p];if(!rec||rec.total===0)return;
    let html=`<div class="summary-box"><p style="margin: 0 0 12px; font-weight: 500;">${escapeHtml(p)}</p>`;
    const wtOrder=workTypes.filter(w=>rec.wt[w]).concat(Object.keys(rec.wt).filter(w=>!workTypes.includes(w)));
    wtOrder.forEach(w=>{const wTotal=rec.wt[w];if(wTotal>0)html+=`<div style="margin-bottom: 12px;"><p style="font-size: 11px; color: #999; margin: 0 0 6px;">${escapeHtml(w)}</p><p style="margin: 0; font-weight: 500;">${wTotal.toFixed(2)}h</p></div>`;});
    html+=`<div style="border-top: 1px solid #ddd; padding-top: 8px; display: flex; justify-content: space-between; font-size: 12px; font-weight: 500;"><span>Project total</span><span>${rec.total.toFixed(2)}h</span></div></div>`;
    out+=html;
  });
  con.innerHTML=out;
}

// ---- export ----
function buildRows(dateStr,dataObj){
  const groups={};
  for(const k in dataObj){const e=parseKey(k);if(!e||!types.includes(e.type))continue;const gk=`${e.emp}|${e.proj}|${e.wt}|${e.cat}`;if(!groups[gk])groups[gk]={emp:e.emp,proj:e.proj,wt:e.wt,cat:e.cat,Office:0,Shop:0,Onsite:0,Travel:0};groups[gk][e.type]+=(dataObj[k]||0);}
  const rows=[];
  Object.values(groups).forEach(g=>{const total=g.Office+g.Shop+g.Onsite+g.Travel;if(total>0)rows.push([dateStr,g.emp,g.proj,g.wt,g.cat,g.Office.toFixed(2),g.Shop.toFixed(2),g.Travel.toFixed(2),g.Onsite.toFixed(2),total.toFixed(2)]);});
  return rows;
}
function downloadCSV(rows,filename){
  let csv='Date,Employee,Job Name,Main Category,Sub Category,Office,Shop,Travel,OnSite,Day Total\n';
  rows.forEach(r=>{csv+=r.map(csvEscape).join(',')+'\n';});
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
}
function exportCSV(){const rows=buildRows(currentDate,data);if(rows.length===0){alert('No hours recorded for '+currentDate+'.');return;}downloadCSV(rows,`zottola_hours_${currentDate}.csv`);}
function exportWeekFor(monday){
  const weekDates=getDateRange(monday);
  let rows=[];
  weekDates.forEach(ds=>{const dd=JSON.parse(localStorage.getItem(getStorageKey(ds)))||{};rows=rows.concat(buildRows(ds,dd));});
  if(rows.length===0){alert('No hours recorded for the week of '+monday+'.');return;}
  rows.sort((a,b)=>a[0].localeCompare(b[0])||a[1].localeCompare(b[1])||a[2].localeCompare(b[2]));
  downloadCSV(rows,`zottola_hours_week_${monday}.csv`);
}
function exportWeekCSV(){exportWeekFor(getMondayOfWeek(currentDate));}
function exportLastWeekCSV(){const t=new Date();t.setDate(t.getDate()-7);exportWeekFor(getMondayOfWeek(t.toISOString().split('T')[0]));}
function exportAllCSV(){
  let allRows=[];
  for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(!key||!key.startsWith('zottola_hours_'))continue;const dateStr=key.replace('zottola_hours_','');const dd=JSON.parse(localStorage.getItem(key))||{};allRows=allRows.concat(buildRows(dateStr,dd));}
  if(allRows.length===0){alert('No saved hours to export.');return;}
  allRows.sort((a,b)=>a[0].localeCompare(b[0])||a[1].localeCompare(b[1]));
  downloadCSV(allRows,`zottola_hours_all.csv`);
}

// ---- admin: projects / work types ----
function addProject(){const inp=document.getElementById('newProjectInput');const v=cleanField(inp.value);if(v&&!projects.includes(v)){projects.push(v);localStorage.setItem('zottola_projects',JSON.stringify(projects));inp.value='';renderSelects();updateProjectList();}else if(v&&projects.includes(v)){alert('That project already exists.');}}
function deleteProjectByIndex(i){const p=projects[i];if(p===undefined)return;if(confirm(`Delete project "${p}"?\n\nThis only removes it from the list. Any hours already logged to it stay saved and still appear in Week View, Summary, and exports.`)){projects.splice(i,1);localStorage.setItem('zottola_projects',JSON.stringify(projects));renderSelects();updateProjectList();}}
function resetProjects(){if(confirm('Reset to the default 28 projects? Custom additions will be removed from the list (logged hours are kept).')){projects=defaultProjects.slice();localStorage.setItem('zottola_projects',JSON.stringify(projects));renderSelects();updateProjectList();}}
function addWorkType(){const inp=document.getElementById('newWorkTypeInput');const v=cleanField(inp.value);if(v&&!workTypes.includes(v)){workTypes.push(v);localStorage.setItem('zottola_workTypes',JSON.stringify(workTypes));inp.value='';renderSelects();updateWorkTypeList();}else if(v&&workTypes.includes(v)){alert('That work type already exists.');}}
function deleteWorkTypeByIndex(i){const w=workTypes[i];if(w===undefined)return;if(confirm(`Delete work type "${w}"?\n\nLogged hours stay saved and still appear in Summary and exports.`)){workTypes.splice(i,1);localStorage.setItem('zottola_workTypes',JSON.stringify(workTypes));renderSelects();updateWorkTypeList();}}
function resetWorkTypes(){if(confirm('Reset to default work types? (Logged hours are kept.)')){workTypes=defaultWorkTypes.slice();localStorage.setItem('zottola_workTypes',JSON.stringify(workTypes));renderSelects();updateWorkTypeList();}}
function updateProjectList(){const list=document.getElementById('projectList');list.innerHTML=projects.map((p,i)=>`<div class="project-item"><span>${escapeHtml(p)}</span><button class="delete-btn" onclick="deleteProjectByIndex(${i})">Delete</button></div>`).join('');document.getElementById('projectCount').textContent=projects.length;document.getElementById('settingsProjects').textContent=projects.length;}
function updateWorkTypeList(){const list=document.getElementById('workTypeList');list.innerHTML=workTypes.map((w,i)=>`<div class="project-item"><span>${escapeHtml(w)}</span><button class="delete-btn" onclick="deleteWorkTypeByIndex(${i})">Delete</button></div>`).join('');document.getElementById('workTypeCount').textContent=workTypes.length;document.getElementById('settingsWorkTypes').textContent=workTypes.length;}

// ---- tabs / settings ----
function switchTab(tab,el){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));document.getElementById(tab).classList.add('active');(el||(window.event&&window.event.target)).classList.add('active');if(tab==='summary')updateSummaryView();if(tab==='week')updateWeekView();}

init();
</script>
